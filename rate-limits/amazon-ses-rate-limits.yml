specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Amazon SES
providerId: amazon-ses
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - AWS
  - Email
  - SES
description: Amazon SES enforces two distinct sending limits per account/region - a 24-hour sending quota
  and a maximum send rate (TPS). Both start in the sandbox and increase after production access is granted
  and reputation is established. The control-plane API (CreateConfigurationSet, etc.) follows AWS API
  throttling. ThrottlingException, MaxSendingRateExceededException, and AccountSendingPausedException
  signal limit conditions.
sources:
  - https://docs.aws.amazon.com/ses/latest/dg/manage-sending-quotas.html
  - https://docs.aws.amazon.com/ses/latest/APIReference-V2/Welcome.html
  - https://docs.aws.amazon.com/general/latest/gr/api-retries.html
headers:
  requestId: x-amzn-RequestId
  retryAfter: Retry-After
responseCodes:
  throttled: 400
  quotaExceeded: 454
  serviceUnavailable: 503
limits:
  - name: 24-hour sending quota (sandbox)
    scope: account/region
    metric: emails_per_day
    limit: 200
    timeFrame: day
    notes: Default sandbox quota. Verified senders only.
  - name: Sending rate (sandbox)
    scope: account/region
    metric: emails_per_second
    limit: 1
    timeFrame: second
    notes: Default 1 message per second in sandbox.
  - name: 24-hour sending quota (production)
    scope: account/region
    metric: emails_per_day
    limit: starts at 50000
    timeFrame: day
    notes: Initial production quota; increases automatically with healthy reputation. Raisable via support.
  - name: Sending rate (production)
    scope: account/region
    metric: emails_per_second
    limit: starts at 14
    timeFrame: second
    notes: Initial production max send rate; increases with reputation.
  - name: SES control-plane API
    scope: account/region
    metric: varies
    limit: see Service Quotas console for SES
    notes: Standard AWS API throttling envelope on management calls.
policies:
  - name: Sandbox to production
    description: Accounts start in sandbox with verified-recipient-only sending; submit a production access
      request to lift this restriction.
  - name: Reputation-based scaling
    description: SES auto-increases the 24-hour quota and TPS based on bounce/complaint rates and consistent
      sending; misuse triggers AccountSendingPausedException.
  - name: Backoff on throttling
    description: Use exponential backoff with jitter on ThrottlingException and MaxSendingRateExceededException;
      AWS SDKs default to standard retry mode.
  - name: Configuration sets
    description: Use configuration sets to apply per-stream sending pools, IP pools, and event publishing
      to scale traffic independently.
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
  - name: Amazon Web Services
    email: support@aws.amazon.com
    url: https://aws.amazon.com
