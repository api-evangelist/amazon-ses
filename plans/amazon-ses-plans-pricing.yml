specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Amazon SES
providerId: amazon-ses
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Amazon
  - AWS
  - Email
  - Transactional Email
  - Marketing Email
description: Amazon Simple Email Service (SES) is pay-as-you-go - $0.10 per 1,000 outbound emails, $0.12/GB
  for outbound attachment data, and $0.10/1,000 inbound emails plus $0.09 per 1,000 incoming email chunks.
  Dedicated IPs are $24.95/IP/month (Standard) or $15/account/month (Managed) with tiered per-message
  rates. New customers receive 3,000 free message charges per month for 12 months as part of AWS Free
  Tier.
sources:
  - https://aws.amazon.com/ses/pricing/
plans:
  - id: amazon-ses-pay-as-you-go
    name: Pay-As-You-Go
    type: usage-based
    description: Default per-message and per-byte pricing for outbound and inbound email.
    entries:
      - label: Outbound emails
        name: outbound_emails
        type: metered
        metric: email
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.10'
        userMultiplied: false
      - label: Outbound attachment data
        name: outbound_attachments
        type: metered
        metric: gb
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.12'
        userMultiplied: false
      - label: Inbound emails
        name: inbound_emails
        type: metered
        metric: email
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.10'
        userMultiplied: false
      - label: Incoming email chunks
        name: inbound_chunks
        type: metered
        metric: chunk
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.09'
        userMultiplied: false
    elements:
      - name: Send via SMTP or HTTP API
      - name: Bounce, complaint, delivery notifications
      - name: Configurable sending identities
  - id: amazon-ses-dedicated-ip-standard
    name: Dedicated IP - Standard
    type: subscription
    description: Reserved sending IPs at a flat per-IP monthly rate.
    entries:
      - label: Dedicated IP per month
        name: dedicated_ip_standard
        type: subscription
        metric: ip-month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '24.95'
        userMultiplied: false
    elements:
      - name: Per-IP reservation
      - name: Customer manages IP reputation
  - id: amazon-ses-dedicated-ip-managed
    name: Dedicated IP - Managed
    type: subscription
    description: SES manages IP warm-up and rotation; flat monthly account fee plus tiered per-message
      rates.
    entries:
      - label: Managed IP monthly fee
        name: managed_ip_fee
        type: subscription
        metric: account-month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '15.00'
        userMultiplied: false
      - label: Managed tier 1 per-message
        name: managed_tier1
        type: tiered
        metric: email
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.08'
        userMultiplied: false
      - label: Managed tier 2 per-message
        name: managed_tier2
        type: tiered
        metric: email
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.04'
        userMultiplied: false
      - label: Managed tier 3 per-message
        name: managed_tier3
        type: tiered
        metric: email
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000
        price: '0.02'
        userMultiplied: false
    elements:
      - name: AWS-managed warm-up
      - name: Reputation pooling
      - name: Tiered per-message discount
  - id: amazon-ses-free-tier
    name: AWS Free Tier
    type: freemium
    description: New customers receive 3,000 message charges per month for 12 months. Covers outbound,
      inbound, and Virtual Deliverability Manager processing combined.
    entries:
      - label: Free monthly message charges
        name: free_messages
        type: quota
        metric: email
        limit: 3000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 12-month duration for new accounts
      - name: Combined outbound + inbound + VDM allowance
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
  - name: Amazon Web Services
    email: support@aws.amazon.com
    url: https://aws.amazon.com
