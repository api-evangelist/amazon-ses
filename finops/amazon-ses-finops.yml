specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Amazon SES
providerId: amazon-ses
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - AWS
  - Email
  - SES
  - Cost Management
description: 'FOCUS-aligned FinOps for Amazon SES: per-1,000-message rates for outbound and inbound mail,
  per-GB attachment fees, monthly Dedicated IP charges (Standard or Managed with tiered per-message),
  and a 12-month 3,000-message-per-month Free Tier.'
sources:
  - https://aws.amazon.com/ses/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amazon Web Services, Inc.
serviceCategory: Communication / Email
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Amazon Simple Email Service
  ServiceCategory: Networking and Content Delivery
  ServiceSubcategory: Email
  ProviderName: AWS
  PublisherName: Amazon Web Services, Inc.
  InvoiceIssuerName: Amazon Web Services, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: outbound_messages
    unit: email
    aggregation: sum
    dimensions:
      - region
      - configuration_set
      - sending_identity
  - name: outbound_attachment_gb
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - configuration_set
  - name: inbound_messages
    unit: email
    aggregation: sum
    dimensions:
      - region
      - rule_set
      - recipient_domain
  - name: inbound_chunks
    unit: chunk
    aggregation: sum
    dimensions:
      - region
      - rule_set
  - name: dedicated_ip_months
    unit: ip-month
    aggregation: sum
    dimensions:
      - region
      - ip_pool_type
  - name: vdm_processed_messages
    unit: email
    aggregation: sum
    dimensions:
      - region
principles:
  - name: Visibility
    description: Use SES sending statistics, CloudWatch SES metrics (Send, Bounce, Complaint, Reject),
      and CUR / FOCUS export for per-configuration-set cost.
  - name: Allocation
    description: Tag configuration sets with Application, Channel, Team; set X-SES-CONFIGURATION-SET on
      sends; enable cost allocation tags.
  - name: Optimization
    description: Use Managed Dedicated IPs to consolidate the IP fee and benefit from tiered per-message
      pricing at scale; suppress invalid recipients; reduce attachment size; use VDM only on streams that
      need deliverability insights.
  - name: Accountability
    description: Set AWS Budgets per configuration-set tag, alert on bounce/complaint rate (which can pause
      sending), and review monthly IP-pool utilization.
