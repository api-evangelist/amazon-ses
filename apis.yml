name: Amazon SES
description: >-
  Amazon Simple Email Service (SES) is a cloud-based email sending service designed to help digital marketers and
  application developers send marketing, notification, and transactional emails, providing a reliable and scalable
  infrastructure for email communication.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
url: https://raw.githubusercontent.com/api-evangelist/amazon-ses/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-05-19'
